name: CI

# Build and test on every push and pull request. No credentials are referenced; the
# default run is green without any Mailgun or NuGet secrets (constitution Principle III).

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to a commit SHA (v4.2.2) for supply-chain integrity; Dependabot bumps it.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history + tags so MinVer can resolve the version deterministically.
          fetch-depth: 0

      - name: Setup .NET
        # Pinned to a commit SHA (v4.3.1) for supply-chain integrity; Dependabot bumps it.
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Audit dependencies for known vulnerabilities
        # Fails the build if any (transitive) package has a known advisory. NU1901-NU1904 are
        # warnings during build (so a new CVE doesn't break local dev); this is the explicit gate.
        run: |
          report=$(dotnet list package --vulnerable --include-transitive)
          echo "$report"
          # This exact phrase appears only when a project HAS vulnerable packages
          # ("...has no vulnerable packages" is the clean case), so it is an unambiguous gate.
          if echo "$report" | grep -q 'has the following vulnerable packages'; then
            echo "::error::Vulnerable NuGet packages detected (see the audit output above)."
            exit 1
          fi

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build
